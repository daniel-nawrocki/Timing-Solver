<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blast Diagram Planner</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Blast Diagram Planner</h1>
    <div class="topbar-actions">
      <button id="exportPdfBtn">Export PDF</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>CSV Import</h2>
        <label class="file-btn">Choose CSV
          <input id="csvInput" type="file" accept=".csv,text/csv" hidden>
        </label>
        <div id="mappingPanel" class="mapping-panel hidden">
          <label>Coordinate Type
            <select id="coordTypeSelect">
              <option value="stateplane">State Plane (X/Y)</option>
              <option value="latlon">Latitude / Longitude</option>
            </select>
          </label>
          <label>X Column
            <select id="xColumnSelect"></select>
          </label>
          <label>Y Column
            <select id="yColumnSelect"></select>
          </label>
          <label>Toe X Column (Optional)
            <select id="toeXColumnSelect"></select>
          </label>
          <label>Toe Y Column (Optional)
            <select id="toeYColumnSelect"></select>
          </label>
          <label>Hole ID Column
            <select id="idColumnSelect"></select>
          </label>
          <button id="importMappedBtn">Import</button>
        </div>
      </section>

      <section class="panel">
        <h2>View</h2>
        <label><input id="gridToggle" type="checkbox" checked> Show Grid</label>
        <button id="fitViewBtn">Fit View</button>
        <label>Coordinate View
          <select id="coordViewSelect">
            <option value="collar">Collar</option>
            <option value="toe">Toe</option>
          </select>
        </label>
        <div class="row-actions">
          <button id="rotateLeftBtn">Rotate -15 deg</button>
          <button id="rotateRightBtn">Rotate +15 deg</button>
        </div>
        <div class="row-actions">
          <button id="rotateFineLeftBtn">Rotate -1 deg</button>
          <button id="rotateFineRightBtn">Rotate +1 deg</button>
        </div>
        <button id="rotateResetBtn">Reset Rotation</button>
      </section>

      <section class="panel">
        <h2>Rows</h2>
        <label>Active Row ID
          <input id="activeRowIdInput" type="number" min="1" value="1">
        </label>
        <div class="row-actions">
          <button id="assignRowBtn">Assign Selected</button>
          <button id="removeFromRowBtn">Clear Row</button>
        </div>
        <div class="row-actions">
          <button id="deleteRowBtn">Delete Active</button>
          <button id="clearAllRowsBtn">Clear All Rows</button>
        </div>
        <div id="rowList" class="list"></div>
      </section>

      <section class="panel">
        <h2>Initiation</h2>
        <button id="clearPathsBtn">Clear Paths</button>
      </section>

      <section class="panel">
        <h2>Center Pull</h2>
        <label><input id="centerPullToggle" type="checkbox"> Enable Center Pull</label>
        <label>Offset Side
          <select id="offsetSideSelect">
            <option value="left">Left Offset</option>
            <option value="right">Right Offset</option>
          </select>
        </label>
        <label>Offset Min (ms)
          <input id="offsetMinInput" type="number" min="0" value="17">
        </label>
        <label>Offset Max (ms)
          <input id="offsetMaxInput" type="number" min="0" value="42">
        </label>
        <button id="clearInitiationAnchorsBtn">Clear Initiation Anchors</button>
        <div id="initiationAnchorList" class="list"></div>
      </section>

      <section class="panel">
        <h2>Timing Ranges</h2>
        <label>Min (ms)
          <input id="holeDelayMinInput" type="number" min="0" value="16">
        </label>
        <label>Max (ms)
          <input id="holeDelayMaxInput" type="number" min="0" value="34">
        </label>
        <label>Min (ms)
          <input id="rowDelayMinInput" type="number" min="0" value="84">
        </label>
        <label>Max (ms)
          <input id="rowDelayMaxInput" type="number" min="0" value="142">
        </label>
        <button id="solveTimingBtn">Find Timing Combinations</button>
        <div id="timingResults" class="list"></div>
      </section>
    </aside>

    <main class="canvas-wrap">
      <canvas id="diagramCanvas" width="1300" height="800"></canvas>
    </main>
  </div>

  <div class="floating-toolkit" aria-label="Tool Kit">
    <div class="toolkit-stack">
      <div class="row-mini-menu" aria-label="Row Controls">
        <span class="row-mini-label">Row</span>
        <button id="rowStepDownBtn" class="row-mini-btn" type="button" aria-label="Previous Row">-</button>
        <span id="rowMiniValue" class="row-mini-value">1</span>
        <button id="rowStepUpBtn" class="row-mini-btn" type="button" aria-label="Next Row">+</button>
      </div>
      <button id="rowPaintToolBtn" class="toolkit-btn" type="button" title="Row Paint Tool" aria-label="Row Paint Tool">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 16l8-8 4 4-8 8H4v-4z"></path>
          <path d="M14 6l2-2 4 4-2 2z"></path>
        </svg>
        <span>Row Paint</span>
      </button>
    </div>
    <button id="initiationToolBtn" class="toolkit-btn" type="button" title="Initiation Path Tool" aria-label="Initiation Path Tool">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="6" cy="6" r="2"></circle>
        <circle cx="18" cy="12" r="2"></circle>
        <circle cx="8" cy="18" r="2"></circle>
        <path d="M8 7.5l8 3M16.5 13.5l-7 3"></path>
      </svg>
      <span>Initiation</span>
    </button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
